apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ImManiKanta/ArgoCD.git
    targetRevision: main
    path: namespaces
  destination:
    server: https://kubernetes.default.svc # current EKS cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true # if deleted in git, delete in cluster also
      selfHeal: true # if someone manually change through CLI, do the self heal
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ImManiKanta/k8s-project.git
    targetRevision: main
    path: mongodb
  destination:
    server: https://kubernetes.default.svc # current EKS cluster
    namespace: roboshop-dev
  syncPolicy:
    automated:
      prune: true # if deleted in git, delete in cluster also
      selfHeal: true # if someone manually change through CLI, do the self heal
    syncOptions:
      - CreateNamespace=true